<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De geheime code van Breendonk</title>
  <link rel="stylesheet" href="/breendonk-escape-room/src/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <span class="badge">Escape Room</span>
      <span class="badge light">Fort Breendonk</span>
    </div>

    <div class="topbar-center">
      <div class="code-tracker">
        <span>Codevakjes:</span>
        <div id="codeSlots" class="slots"></div>
      </div>
    </div>

    <div class="timer-box">
      <span class="timer-label">Tijd resterend</span>
      <span id="timer">45:00</span>
    </div>
  </header>

  <main class="container">
    <div id="app"></div>
  </main>

  <script type="module" src="/breendonk-escape-room/src/script.js"></script>
</body>
</html>
